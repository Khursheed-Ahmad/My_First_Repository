name: cicd

on:
   workflow_dispatch:

jobs: 
   code:
    runs-on: ubuntu-latest
    steps:
       - name: checkout code
         run: echo 'code clone from github'

   build:
       needs: code
       runs-on: ubuntu-latest
       steps:
          - name: build docker container
            run: echo 'docker container build'

   test:
       needs: build
       runs-on: ubuntu-latest
       steps:
          - name: test the container
            run: echo 'test container'

   deploy:
         needs: [build,test] 
         runs-on: ubuntu-latest
         steps:
            - name: deploy the app
              run: echo 'deploy the app sucssefully done'
   
